<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0d3c3f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        p {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 25px;
        }
        .links {
            display: flex;
            gap: 15px;
        }
        .links a {
            color: #ffffff;
            text-decoration: none;
            background-color: #222222;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: background 0.2s;
            border: 1px solid #333333;
        }
        .links a:hover {
            background-color: #333333;
        }
    </style>
</head>
<body>
    <h1>Sherryl Andrade</h1>
    <p>Assistant Project Manager</p>
    
    <div class="links">
        <!-- Change the URLs inside href="" to your actual links later if you want! -->
        <a href="https://www.linkedin.com/in/sherrylandrade/" target="_blank">LinkedIn</a>
        <a href="mailto:sherryl.andrade@gmail.com">Email Me</a>
    </div>
</body>
</html>
